apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  labels:
    app: ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ha
  template:
    metadata:
      labels:
        app: ha
    spec:
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable
          ports:
            - containerPort: 8123
          volumeMounts:
            - name: ha-data
              mountPath: /config
          env:
            - name: TZ
              value: "Europe/Madrid" 
      volumes:
        - name: ha-data
          persistentVolumeClaim:
            claimName: ha-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ha-service
spec:
  type: NodePort
  selector:
    app: ha
  ports:
    - protocol: TCP
      port: 8123
      targetPort: 8123
      nodePort: 30123
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ha-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi